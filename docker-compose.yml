services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    # Ports removed - Traefik handles all ingress
    # ports:
    #   - "${N8N_PORT}:5678"
    environment:
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE}
      N8N_GIT_NODE_DISABLE_BARE_REPOS: ${N8N_GIT_NODE_DISABLE_BARE_REPOS}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_HOST: ${N8N_HOST}
      DB_SQLITE_POOL_SIZE: ${DB_SQLITE_POOL_SIZE}
      N8N_RUNNERS_ENABLED: ${N8N_RUNNERS_ENABLED}
    volumes:
      - ./data:${DATA_FOLDER}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - traefik-proxy    # For web UI via Traefik
      - database-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"

      # Production - HTTPS
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.routers.n8n.service=n8n"
      # - "traefik.http.routers.n8n.tls=true"
      # - "traefik.http.routers.n8n.tls.certresolver=cloudflare"

      # Service configuration
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.services.n8n.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.n8n.loadbalancer.healthcheck.interval=30s"


networks:
  # External network for Traefik proxy (ingress)
  traefik-proxy:
    external: true
    name: traefik-proxy

  # External network for shared database access (e.g., n8n)
  database-network:
    external: true
    name: database-network

